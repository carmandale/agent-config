# Beads Configuration File
# This file configures default behavior for br (beads_rust) in this repository
# All settings can also be set via environment variables (BR_* prefix)
# or overridden with command-line flags

# Issue prefix for this repository (used by br init --prefix)
# br auto-detects from directory name if not set via --prefix flag
# Our prefix: ".agent-config" → issues like ".agent-config-abc", ".agent-config-xyz"
# issue-prefix: ""

# Disable auto-flush of database to JSONL after mutations
# no-auto-flush: false

# Disable auto-import from JSONL when it's newer than database
# no-auto-import: false

# Enable JSON output by default
# json: false

# Default actor for audit trails (overridden by BR_ACTOR or --actor)
# actor: ""

# Path to database (overridden by --db)
# db: ""

# NOTE: br has no daemon. All operations are direct SQLite access.
# The following bd-era settings are no longer applicable:
# - no-daemon (br has no daemon)
# - auto-start-daemon (br has no daemon)
# - flush-debounce (br flushes immediately)
# - sync-branch (br never touches git)
