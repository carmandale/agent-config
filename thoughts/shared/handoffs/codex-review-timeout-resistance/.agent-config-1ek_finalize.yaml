goal: >
  Eliminate bash tool timeout kills during /codex-review by replacing raw codex exec
  invocations with a wrapper script that agents call instead — removing the opportunity
  to add timeout parameters, | tail pipes, or other invocation mangling.

now: >
  Wrapper script `tools-bin/codex-review-exec` is live on PATH. `commands/codex-review.md`
  (rev 4) references it in Steps 3 and 5. All raw codex exec blocks replaced. 5 anti-patterns
  cover all timeout mechanisms. Merged to main, pushed to GitHub. Bead closed.

outcome: SUCCEEDED

final_solutions:
  - title: "Wrapper script in tools-bin"
    description: >
      Created `tools-bin/codex-review-exec` — a portable bash script that encapsulates
      the entire codex exec invocation. Agents write the prompt file (their strength),
      call the script (one short command), and read the output. The script handles input
      validation, stale output cleanup, set +e for exit code capture, output file
      validation, and diagnostics. No timeout of any kind. Stderr passes through
      unchanged so agents can still extract session IDs from bash tool output.
    files:
      - tools-bin/codex-review-exec

  - title: "Command template update (rev 3 → 4)"
    description: >
      Replaced Steps 3B/3C and 5B/5C in codex-review.md with single wrapper calls.
      Error check blocks eliminated (script handles validation internally). Added 5th
      anti-pattern explicitly covering bash tool timeout parameter. Model default
      deferred to codex config.toml.
    files:
      - commands/codex-review.md

final_decisions:
  - decision: "Wrapper script over template-only fix"
    rationale: >
      Spec 017 tried template-only (anti-patterns saying "don't use timeout").
      MintWolf's session proved it insufficient — agent set timeout on bash tool
      parameter, technically different layer from the shell timeout command the
      anti-pattern prohibited. Template-only fixes cannot control tool call parameters.

  - decision: "Script does NOT parse session IDs"
    rationale: >
      RedViper's adversarial review caught this — parsing stderr for session ID via
      grep/sed adds fragility. Script passes stderr through unchanged. Agent extracts
      session ID from bash tool output as before. One less thing to break.

  - decision: "No model default in script"
    rationale: >
      RedViper catch — if --model omitted, script doesn't pass -m to codex. Codex uses
      its own config.toml default. Prevents conflicts between script and codex config.

  - decision: "set +e around codex invocation"
    rationale: >
      RedViper catch — with set -euo pipefail, a codex non-zero exit would kill the
      script before reaching exit code capture or diagnostics. Exactly the opposite
      of what we want. set +e before codex, set -e after capture.

  - decision: "tools-bin/ not scripts/"
    rationale: >
      tools-bin/ is already on PATH. scripts/ is relative to agent-config and doesn't
      resolve from other project directories (confirmed: MintWolf tried scripts/gate.sh
      from hsbc → "not found"). tools-bin/ makes the script callable as a bare command
      from anywhere.

