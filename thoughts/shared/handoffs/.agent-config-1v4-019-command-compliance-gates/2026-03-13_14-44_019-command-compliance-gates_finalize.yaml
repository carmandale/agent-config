final_solutions:
  - problem: "Agents bypass workflow gates despite documentation"
    solution: "scripts/gate.sh — deterministic bash script that reads gate_* frontmatter keys from command files and exits 0/1/2. Code is deterministic, language isn't."
  - problem: "No way to verify prior-stage artifacts were produced by the correct command"
    solution: "Provenance sentinels (<!-- command:complete:v1 | harness: ... | date: ... -->) written by gate.sh record, checked by gate.sh gate via gate_sentinels key"
  - problem: "Agents fabricate missing artifacts instead of stopping"
    solution: "Three-layer anti-fabrication: (A) gate_must_not_create frontmatter + HARD CONSTRAINT text, (B) gate.sh verify with timestamp-based mtime comparison, (C) PostToolUse hook (deferred stretch goal)"
  - problem: "Enforcement only works if agents cooperate"
    solution: "Layer 2a: Claude Code UserPromptSubmit hook runs gate.sh automatically and hard-blocks via result:'block'. Layer 2b: Pi extension detects/warns. Layer 3: sentinel verification at next stage catches bypass."

final_decisions:
  - decision: "Exit 2 (WARN) is user-delegated, not agent-delegated"
    rationale: "WARN exists solely for gate_warn_sentinels (codex-review soft enforcement). Agent cannot proceed past WARN on its own — must surface warning and let user decide."
  - decision: "Phase 5b (PostToolUse anti-fabrication hook) deferred"
    rationale: "Requires session state tracking. Plan ships without it. Layers A+B sufficient for v1."
  - decision: "/shape has no gate_requires — remains valid entry point before /issue"
    rationale: "Preserves existing flow (shape → issue → plan). gate.sh not invoked when no spec dir provided."
  - decision: "Backward compatible — existing specs without sentinels get WARN not FAIL"
    rationale: "R6: no retroactive enforcement. Specs 001-018 remain implementable."
  - decision: "Sentinel chain starts at /plan, not /issue"
    rationale: "/issue is new — existing specs lack issue sentinels. Starting at /plan avoids breaking all existing specs."

